name: "Pipeline 3 - Aplicaciones"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Pilar2/P5/**"
      - "k8s/gke/apps/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1
  REPO: sdypp

jobs:
  gitleaks:
    uses: ./.github/workflows/gitleaks.yml

  build-and-push:
    name: Build ${{ matrix.name }}
    needs: gitleaks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./app
            dockerfile: ./app/Dockerfile
            image: frontend
          - name: nct
            context: ./Pilar2/P5
            dockerfile: ./Pilar2/P5/Dockerfile.api
            image: blockchain-nct
          - name: trp
            context: ./Pilar2/P5
            dockerfile: ./Pilar2/P5/Dockerfile.trp
            image: blockchain-trp
          - name: worker-cpu
            context: ./Pilar2/P5
            dockerfile: ./Pilar2/P5/Dockerfile.cpu
            image: blockchain-worker-cpu
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        env:
          # NEXT_PUBLIC_* se inlinean en build time por Next.js — solo
          # se pasan cuando el target es el frontend.
          CLOUDINARY_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ matrix.image }}"
          BUILD_ARGS=""
          if [ "${{ matrix.name }}" = "frontend" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${CLOUDINARY_NAME} --build-arg NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${CLOUDINARY_PRESET}"
          fi
          docker build $BUILD_ARGS -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" \
            -f ${{ matrix.dockerfile }} ${{ matrix.context }}
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy:
    name: Deploy to GKE
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: sdypp-cluster
          location: us-central1-a

      - name: Update image tags and deploy
        run: |
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}"
          cd k8s/gke/apps

          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/blockchain-nct:${{ github.sha }}|" nct-deployment.yaml
          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/blockchain-trp:${{ github.sha }}|" trp-deployment.yaml
          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/blockchain-worker-cpu:${{ github.sha }}|" worker-cpu-deployment.yaml
          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/frontend:${{ github.sha }}|" frontend-deployment.yaml

          kubectl apply -f .
