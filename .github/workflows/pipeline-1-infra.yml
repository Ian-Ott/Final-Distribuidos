name: "Pipeline 1 - Infraestructura GKE"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gitleaks:
    uses: ./.github/workflows/gitleaks.yml

  tofu:
    name: OpenTofu Plan & Apply
    needs: gitleaks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v1

      - name: Init
        run: tofu init

      - name: Import existing resources
        run: |
          tofu import -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            google_artifact_registry_repository.docker \
            "projects/${{ secrets.GCP_PROJECT_ID }}/locations/us-central1/repositories/sdypp" \
            || true
          tofu import -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            google_container_node_pool.infra \
            "projects/${{ secrets.GCP_PROJECT_ID }}/locations/us-central1-a/clusters/sdypp-cluster/nodePools/infra" \
            || true

      - name: Plan
        run: tofu plan -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -out=plan.tfplan

      - name: Apply
        env:
          TF_LOG: DEBUG
        run: tofu apply -no-color plan.tfplan
