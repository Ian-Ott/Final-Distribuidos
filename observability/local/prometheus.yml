# Prometheus para el entorno local (docker-compose). Scrapea el frontend en
# su /api/metrics. Si se levanta el stack de blockchain local, agregar más
# targets acá.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: frontend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["app:3000"]
        labels:
          app: frontend
