apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-api
spec:
  replicas: 2

  selector:
    matchLabels:
      app: blockchain-api

  template:
    metadata:
      labels:
        app: blockchain-api

    spec:
      containers:
      - name: api

        image: ianott/blockchain-api:latest

        ports:
        - containerPort: 8000
        resources:
            limits:
              nvidia.com/gpu: 1
      