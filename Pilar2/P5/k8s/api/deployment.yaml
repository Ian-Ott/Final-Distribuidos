apiVersion: apps/v1
kind: Deployment

metadata:
  name: blockchain-nct

spec:
  replicas: 2

  selector:
    matchLabels:
      app: blockchain-nct

  template:

    metadata:
      labels:
        app: blockchain-nct

    spec:

      containers:

      - name: nct

        image: bachi7/blockchain-nct4:latest

        ports:

        - containerPort: 8000

        # Liveness: /healthz NO toca Redis -> solo reinicia el pod si el
        # proceso uvicorn se colgó de verdad, no cuando Redis está caído.
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3

        # Readiness: /status sí toca Redis. Mientras Redis no responda (o el
        # proceso aún esté importando y conectando a RabbitMQ a nivel módulo),
        # el pod sale del Service y no recibe tráfico -> evita los
        # "connection refused" esporádicos al emitir/minar.
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        resources:

          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 250m
            memory: 256Mi
        
      