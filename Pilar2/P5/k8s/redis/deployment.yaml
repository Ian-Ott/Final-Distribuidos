apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis

spec:
  replicas: 1
  strategy:
    type: Recreate # ESTO MATA EL POD VIEJO ANTES DE CREAR EL NUEVO
  selector:
    matchLabels:
      app: redis

  template:

    metadata:

      labels:
        app: redis

    spec:
      affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                  - knode10 # <--- EVITA EL NODO CON EL VOLUMEN TRABADO

      containers:

      - name: redis

        image: redis:7

        # maxmemory POR DEBAJO del limit del cgroup para que Redis se
        # autolimite ANTES de que el kernel lo OOM-killee. Política
        # noeviction: si igual se llenara, los writes fallan de forma
        # ruidosa (error visible) en vez de evictar blockchain/op:*/ownership
        # silenciosamente — esos datos NO se pueden perder. La fuga real de
        # memoria (la lista "logs" sin límite) se ataca en el NCT con un
        # janitor que la trimea; esto es la red de seguridad de infra.
        command: ["redis-server"]
        args:
        - "--maxmemory"
        - "200mb"
        - "--maxmemory-policy"
        - "noeviction"

        ports:

        - containerPort: 6379
        resources:

          requests:
            cpu: 50m
            memory: 128Mi

          limits:
            cpu: 128m
            memory: 256Mi

        volumeMounts:

        - name: redis-storage

          mountPath: /data

      volumes:

      - name: redis-storage

        persistentVolumeClaim:

          claimName: redis-pvc