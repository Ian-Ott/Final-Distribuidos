apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
data:
  # rabbitmq:3 por defecto calcula el high watermark sobre la RAM del NODO,
  # no del contenedor -> cree que tiene varios GB, nunca aplica backpressure
  # y crece hasta el limit del cgroup -> OOM-Kill.
  #
  # total_memory_available_override_value le dice cuanta RAM tiene REALMENTE
  # (la del limit del contenedor). Con eso, el watermark relativo se calcula
  # bien: bloquea a los publishers en ~0.6 * 384MB = ~230MB, ANTES de llegar
  # al limit de 384Mi del cgroup. Backpressure en vez de OOM.
  rabbitmq.conf: |
    total_memory_available_override_value = 384MB
    vm_memory_high_watermark.relative = 0.6
