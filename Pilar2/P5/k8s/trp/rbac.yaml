apiVersion: v1
kind: ServiceAccount
metadata:
  name: trp-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trp-scaler
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trp-scaler-binding
subjects:
- kind: ServiceAccount
  name: trp-sa
roleRef:
  kind: Role
  name: trp-scaler
  apiGroup: rbac.authorization.k8s.io