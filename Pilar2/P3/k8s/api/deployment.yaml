apiVersion: apps/v1
kind: Deployment

metadata:
  name: blockchain-consumidor

spec:
  replicas: 2

  selector:
    matchLabels:
      app: blockchain-consumidor

  template:

    metadata:
      labels:
        app: blockchain-consumidor

    spec:

      containers:

      - name: consumidor

        image: ianott/blockchain-consumidor3:latest

        ports:

        - containerPort: 8000
        
        resources:

          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 250m
            memory: 256Mi
        
      