apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sdypp
data:
  # Infra compartida
  RABBITMQ_HOST: "rabbitmq"
  REDIS_HOST: "redis"
  DATABASE_URL: "postgres://entradas:entradas@postgres:5432/entradas"
  NODE_ENV: "production"

  # NCT real (extendido — ver ADR-018 en app/docs/adr/018-contrato-nct-ownership.md).
  # El Service nct expone port 80 → targetPort 8000 del pod, así que la URL
  # no lleva puerto explícito (HTTP default 80).
  NCT_URL: "http://blockchain-nct"
  # Las vars NCT_MOCK_* solo aplican cuando NCT_URL=mock (dev local).

  # MercadoPago — el access token vive en el Secret app-secrets.
  # En prod cambiar a https://tesera.tech.
  MP_PUBLIC_URL: "https://tesera.tech"

  # --- Observabilidad ---
  # Trazas OTLP del frontend (@vercel/otel usa OTLP HTTP → puerto 4318 de Alloy).
  # Los servicios Python usan gRPC 4317 por defecto (ver observability.py), no
  # necesitan esta env. Para deshabilitar trazas: OTEL_SDK_DISABLED=true.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.observability.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "frontend"
  LOG_LEVEL: "INFO"
