apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-nct
  namespace: sdypp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blockchain-nct
  template:
    metadata:
      labels:
        app: blockchain-nct
    spec:
      nodeSelector:
        pool: apps
      containers:
        - name: nct
          image: IMAGE_TAG
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
