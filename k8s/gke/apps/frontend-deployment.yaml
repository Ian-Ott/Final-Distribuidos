apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sdypp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        # El frontend expone /api/metrics (prom-client) en su puerto 3000.
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      nodeSelector:
        pool: apps
      containers:
        - name: frontend
          image: IMAGE_TAG
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          # Probes laxas: /api/health hace un SELECT 1 a Postgres y bajo carga
          # puede tardar más de 1s. Con probes agresivas, cualquier hipo de DB
          # mata el pod (cascade observado en producción cuando Postgres reinició).
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
