apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: sdypp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        # El plugin rabbitmq_prometheus expone /metrics en 15692 (HTTP plano).
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
    spec:
      nodeSelector:
        pool: infra
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5671
            - containerPort: 15671
            - containerPort: 15692 # métricas Prometheus
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: rabbitmq-tls
        - name: config
          configMap:
            name: rabbitmq-config
