apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: sdypp
data:
  # Habilita el plugin de management (ya venía con la imagen -management) y el de
  # Prometheus, que expone /metrics en HTTP plano por el puerto 15692. Ese listener
  # es independiente del AMQP TLS-only de abajo (listeners.tcp = none NO lo afecta).
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_prometheus].
  rabbitmq.conf: |
    # rabbitmq:3 calcula el high watermark sobre la RAM del NODO, no del
    # contenedor -> cree que tiene varios GB, nunca aplica backpressure y crece
    # hasta el limit del cgroup (512Mi) -> OOM-Kill (bug C2).
    # total_memory_available_override_value le dice cuanta RAM tiene REALMENTE
    # (la del limit). Con eso, bloquea a los publishers en ~0.6*512MB = ~307MB,
    # antes del OOM. Backpressure en vez de morir.
    total_memory_available_override_value = 512MB
    vm_memory_high_watermark.relative = 0.6
    listeners.tcp = none
    listeners.ssl.default = 5671
    ssl_options.cacertfile = /tls/rabbitmq-cert.pem
    ssl_options.certfile   = /tls/rabbitmq-cert.pem
    ssl_options.keyfile    = /tls/rabbitmq-key.pem
    ssl_options.verify     = verify_none
    management.ssl.port    = 15671
    management.ssl.cacertfile = /tls/rabbitmq-cert.pem
    management.ssl.certfile   = /tls/rabbitmq-cert.pem
    management.ssl.keyfile    = /tls/rabbitmq-key.pem
