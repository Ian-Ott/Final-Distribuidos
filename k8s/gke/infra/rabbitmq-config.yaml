apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: sdypp
data:
  rabbitmq.conf: |
    listeners.tcp = none
    listeners.ssl.default = 5671
    ssl_options.cacertfile = /tls/rabbitmq-cert.pem
    ssl_options.certfile   = /tls/rabbitmq-cert.pem
    ssl_options.keyfile    = /tls/rabbitmq-key.pem
    ssl_options.verify     = verify_none
    management.ssl.port    = 15671
    management.ssl.cacertfile = /tls/rabbitmq-cert.pem
    management.ssl.certfile   = /tls/rabbitmq-cert.pem
    management.ssl.keyfile    = /tls/rabbitmq-key.pem
