apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sdypp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        pool: infra
      containers:
        - name: redis
          image: redis:7
          # --maxmemory por debajo del limit del cgroup (256Mi) para que Redis
          # se autolimite ANTES de que el kernel lo OOM-killee. noeviction: si
          # igual se llenara, los writes fallan ruidosamente en vez de evictar
          # blockchain/op:*/ownership en silencio (esos datos NO se pueden
          # perder). La fuga real (lista "logs") la acota el logs-janitor del
          # NCT; esto es la red de seguridad de infra (bug C1).
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--maxmemory", "200mb", "--maxmemory-policy", "noeviction"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
