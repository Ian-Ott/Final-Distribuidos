apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-gpu-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-gpu-server
  template:
    metadata:
      labels:
        app: blockchain-gpu-server
      annotations:
        # /metrics en el mismo 8000. Mismo caveat cross-cluster que el worker GPU.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gpu-server
          image: IMAGE_TAG
          command: ["uvicorn", "gpu-server:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: RABBITMQ_HOST
              value: "34.46.108.71"
          resources:
            limits:
              nvidia.com/gpu: 1
