apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-worker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: blockchain-worker
  template:
    metadata:
      labels:
        app: blockchain-worker
      annotations:
        # Métricas en 9000. OJO: este pod vive en el cluster del profesor; el
        # Prometheus de GKE no lo alcanza por red. Para monitorearlo haría falta
        # un agente local con remote_write (ver README de observabilidad).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
    spec:
      containers:
        - name: worker
          image: IMAGE_TAG
          command: ["python3", "worker.py"]
          ports:
            - name: metrics
              containerPort: 9000
          env:
            - name: RABBITMQ_HOST
              value: "34.46.108.71"
            - name: GPU_SERVICE_URL
              value: "http://blockchain-gpu-server:8000/mine"
            # Tracing apagado: este pod vive en el cluster del profesor y no
            # alcanza el Alloy de GKE (alloy.observability no resuelve acá), así
            # que el exporter OTLP spameaba errores. Logs y /metrics siguen.
            - name: OTEL_SDK_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
